# -----------------------------------------
# 📦 .github/workflows/deploy.yml
# ⚙️ Script: Despliegue automático en carpeta dinámica /var/www/<REPO>_<BRANCH> usando runner local
# 🙍 Autor: Getsemani Ávila
# 📅 Fecha: 2025-05-13
# -----------------------------------------

name: Despliegue de Pagina en Matriz

on:
  push:
    branches: [ "main","dev" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Obtener nombre del repo y branch
        id: vars
        run: |
          echo "repo_name=$(basename $GITHUB_REPOSITORY)" >> $GITHUB_OUTPUT
          echo "branch_name=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      - name: Desplegar archivos
        run: |
          TARGET_DIR="/var/www/${{ steps.vars.outputs.repo_name }}_${{ steps.vars.outputs.branch_name }}"
          echo "📁 Desplegando a $TARGET_DIR"
          sudo mkdir -p "$TARGET_DIR"
          sudo rsync -av --delete ./ "$TARGET_DIR/"

      - name: Instalar dependencias con Composer
        run: |
          TARGET_DIR="/var/www/${{ steps.vars.outputs.repo_name }}_${{ steps.vars.outputs.branch_name }}"
          if [ -f "$TARGET_DIR/composer.json" ]; then
            echo "📦 Instalando Composer en $TARGET_DIR"
            cd "$TARGET_DIR"
            sudo -u github-action composer install --no-interaction --prefer-dist --no-dev
          else
            echo "⚠️ composer.json no encontrado, se omite instalación."
          fi
